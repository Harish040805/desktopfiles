<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paneer AI Search</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⬜</text></svg>">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
      background: linear-gradient(
    90deg,
    #f5f5dc,
    #fffbca, 
    #ebdd9824, 
    #fafafa 
  );
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 80vh;
    padding-top: 100px;
  }
  .browser {
    width: 90%;
    max-width: 900px;
    text-align: center;
  }
  #titleContainer {
    margin-bottom: 20px;
    margin-top: 20px;
  }
  #titleContainer h1 {
    font-size: 36px;
    color: #202124;
    margin-bottom: 20px;
  }
  #inputContainer {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  #aiInput {
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    border-radius: 50px;
    border: 1px solid #ccc;
    padding: 10px 15px;
    font-size: 16px;
    outline: none;
    transition: box-shadow 0.1s ease;
    min-width: 700px;
  }
  #aiInput:focus {
    box-shadow: 0 6px 14px rgba(26, 115, 232, 0.4);
    border-color: #1a73e8;
  }
  #sendBtn {
    padding: 12px 20px;
    font-size: 16px;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    background: #f8f9fa;
    cursor: pointer;
  }
  #sendBtn:hover {
    background: #f1f3f4;
  }
  #aiResponse {
    text-align: left;
    margin-top: 30px;
  }
  .answer {
    font-size: 18px;
    line-height: 1.6;
    color: #202124;
    padding: 16px 20px;
    border: 1px solid rgba(26,115,232,0.15);
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(60,64,67,0.15);
    background: #fff;
    white-space: pre-line;
  }
  .ref-links {
    margin-top: 12px;
    font-size: 18px;
    color: #1a73e8;
  }
  .ref-links a {
    display: block;
    margin-right: 6px;
    text-decoration: none;
    color: #1a73e8;
  }
  .ref-links a:hover {
    text-decoration: underline;
  }

#titleContainer {
  margin-bottom: 20px;
  margin-top: 20px;
  display: flex;
  justify-content: center;
}
.title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 5px solid #c9b770;
  border-radius: 30px;
  background:linear-gradient(
    90deg, 
    #fdfd96,   
    #ffe282,   
    #fcfcc3,   
    #fdeba1,  
    #fff5e1
  );
  padding: 20px;
}
.ai-title {
  font-size: 64px !important;
  font-weight: 700;
  font-family: 'Arial', sans-serif;
  letter-spacing: 1px;
  line-height: 1.2;
  background: #c9b770;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
  margin: 0;
}
.emojo {
  font-size: 64px !important;
  line-height: 1.2;
  margin: 0;
}
.tabs {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
}
.tab {
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  background: #f1f3f4;
}
.tab.active {
  background: #1a73e8;
  color: #fff;
}
.tab-content {
  display: none;
  margin-top: 20px;
}
.tab-content.active {
  display: block;
}
iframe {
  width: 100%;
  height: 500px;
  border: none;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="browser">
<div id="titleContainer">
  <div class="title-row">
    <span class="emojo">⬜</span>
    <span class="ai-title">&nbsp; Paneer AI Search&nbsp;</span>
    <span class="emojo">🥛</span>
  </div>
</div>
  <br><br><br><br>
  <div id="inputContainer">
    <input id="aiInput" type="text" placeholder="Search with AI...">
    <button id="sendBtn"><i class="fa-solid fa-magnifying-glass"></i> &nbsp; Search</button>
  </div>
<div class="tabs">
  <div class="tab active" data-target="web">Web</div>
  <div class="tab" data-target="images">Images</div>
  <div class="tab" data-target="videos">Videos</div>
</div>
<div id="web" class="tab-content active">
  <div id="aiResponse"></div>
</div>
<div id="images" class="tab-content">
  <iframe id="imagesFrame"></iframe>
</div>
<div id="videos" class="tab-content">
  <iframe id="videosFrame"></iframe>
</div>
</div>

<script>
const AI_API_KEY = "AIzaSyC5ab-HZmvtoTEXMRBMb4-tPpwD2yMVF1A";

function sanitizeText(text) {
  return text
    .replace(/\*/g, '')
    .replace(/```/g, '')
    .replace(/\/\//g, '');
}

function displaySearchResult(answer, links = []) {
  const div = document.getElementById("aiResponse");

  const paragraphs = sanitizeText(answer)
    .split(/\n+/)
    .map(p => `<p>${p}</p>`)
    .join("");

  const linkSection = links.length
    ? `<div class="ref-links"><strong>References:</strong><br>${links
        .map(l => `<a href="${l}" target="_blank">${l}</a>`)
        .join("")}</div>`
    : "";

  div.innerHTML = `<div class="answer">${paragraphs}${linkSection}</div>`;
}

async function sendSearch() {
  const input = document.getElementById("aiInput");
  const query = input.value.trim();
  if (!query) return;
  input.value = "";

  document.getElementById("imagesFrame").src =
    "https://www.google.com/search?tbm=isch&q=" + encodeURIComponent(query);
  document.getElementById("videosFrame").src =
    "https://www.youtube.com/results?search_query=" + encodeURIComponent(query);

  displaySearchResult("<em>Searching...</em>");

  const normalizedQuery = query.toLowerCase().replace(/\?+$/, "").trim();

  if (normalizedQuery === "what is paneer ai") {if (
  normalizedQuery === "what is paneer ai" ||
  normalizedQuery === "who found paneer ai" ||
  normalizedQuery === "who is the father of paneer ai"
) {
    const defaultAnswer = `
      Paneer AI is an AI-integrated search engine developed by Harish. It combines modern artificial intelligence techniques to provide 
      informative, structured, and easily accessible search results. With Paneer AI, users can type queries in natural language, 
      and the engine interprets them intelligently to deliver precise answers along with relevant references.

      This search platform aims to enhance information discovery while keeping the user interface simple, intuitive, and visually 
      appealing. Paneer AI also includes features like voice reading, paragraph-wise formatting, and referral links to trusted sources 
      such as Google, YouTube, and Wikipedia.
    `;

    const referralLinks = [
      "https://www.google.com/search?q=Paneer+AI",
      "https://www.youtube.com/results?search_query=Paneer+AI",
      "https://en.wikipedia.org/wiki/Paneer_AI"
    ];

    displaySearchResult(defaultAnswer, referralLinks);
    return;
  }

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${AI_API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ role: "user", parts: [{ text: query }] }]
        })
      }
    );

    const data = await response.json();
    const botAnswer =
      data?.candidates?.[0]?.content?.parts?.[0]?.text || "No results found.";

    const referralLinks = [
      "https://aistudio.google.com/app/prompts/new_chat?q=" + encodeURIComponent(query),
      "https://www.google.com/search?q=" + encodeURIComponent(query),
      "https://en.wikipedia.org/wiki/" + encodeURIComponent(query),
      "https://www.youtube.com/results?search_query=" + encodeURIComponent(query)
    ];

    displaySearchResult(botAnswer, referralLinks);
  } catch (e) {
    displaySearchResult(`<span style="color:red;">Error: ${e.message}</span>`);
  }
}

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("sendBtn").addEventListener("click", sendSearch);

  document.getElementById("aiInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendSearch();
    }
  });

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c =>
        c.classList.remove("active")
      );
      tab.classList.add("active");
      document.getElementById(tab.dataset.target).classList.add("active");
    });
  });
});
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
