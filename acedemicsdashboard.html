    /* Reset and Layout */
    * { box-sizing: border-box; }

    #scrollDnBtn {

        cursor: pointer;

    #scrollUpBtn {

        border: none; 
        color: #000; 
        font-weight: bold;

    }

    /* Main Container */
    .main-content {
        display: flex;
        gap: 2px;
        flex: 1;
        min-height: 0; 
    }

    /* Tables Column */
    .tables-section {
        flex: 3; 
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    /* Wrap tables in flex-grow containers to eliminate blank space below */
    .table-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    /* Notes Column */
    .notes-section {
        flex: 1; 
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    /* Table & Header Styling */
    h3 { 
        margin: 0; 
        font-size: 13px; 
        background-color: #00ec00; 
        padding: 2px; 
        color: #fff; 
        text-align: center;
        flex-shrink: 0;
    }
    table { 
        width: 100%; 
        border-collapse: collapse; 
        background: #fff; 
        flex: 1; /* Makes table fill the container */
    }
    th, td { 
        border: 1px solid #1fed0c; 
        padding: 0; /* Remove padding for total compactness */
        text-align: center; 
        font-size: 11px;
    }
    th { background-color: lime; color: white; }
    
    /* Input Compactness - 100% Width */
    input[type="number"] { 
        width: 100%; 
        height: 100%;
        border: none; 
        padding: 2px; 
        font-size: 11px; 
        text-align: center;
        outline: none;
    }
    
    /* Checkbox Grouping - No Spacing */
    .checkbox-cell {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0;
        height: 100%;
    }
    input[type="checkbox"] { 
        margin: 0;
        padding: 0;
        transform: scale(0.85);
        cursor: pointer;
    }
    tr:nth-child(even) { background-color: #f9f9f9; }

    /* Textarea - 100% Height/Width */
    .scroll-textbox { 
        flex: 1; 
        width: 100%; 
        border: 1px solid #1fed0c; 
        padding: 5px; 
        resize: none; 
        font-size: 13px; 
        font-family: Arial, sans-serif;
        background: #fff;
        outline: none;
    }

    .key-row { background-color: lime !important; color: #fff; font-size: 9px; }
</style>

<script>
let db;
const DB_NAME = "AcademicsDashboardDB";
const DB_VERSION = 1;
const STORE_NAME = "fields";

const request = indexedDB.open(DB_NAME, DB_VERSION);

request.onupgradeneeded = function(event) {
    db = event.target.result;
    if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "id" });
    }
};

request.onsuccess = function(event) {
    db = event.target.result;
    restoreAllFields();
};

function saveField(id, value) {
    const transaction = db.transaction([STORE_NAME], "readwrite");
    const store = transaction.objectStore(STORE_NAME);
    store.put({ id, value });
}

function restoreAllFields() {
    const transaction = db.transaction([STORE_NAME], "readonly");
    const store = transaction.objectStore(STORE_NAME);
    const requestAll = store.getAll();
    requestAll.onsuccess = function() {
        requestAll.result.forEach(item => {
            const el = document.getElementById(item.id);
            if (el) {
                if (el.type === "checkbox") el.checked = item.value;
                else el.value = item.value;
            }
        });
    };
}

let allInputs = document.querySelectorAll("input, textarea");
allInputs.forEach((el, index) => {
    if (!el.id) el.id = "field_" + index;
    if (el.type === "checkbox") {
        el.addEventListener("change", () => saveField(el.id, el.checked));
    } else {
        el.addEventListener("input", () => saveField(el.id, el.value));
    }
});

document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('input', () => {
        let val = parseInt(input.value);
        let min = parseInt(input.min) || 0;
        let max = parseInt(input.max) || 100;
        if (!isNaN(val)) {
            if (val < min) input.value = min;
            if (val > max) input.value = max;
        }
        const cell = input.parentElement;
        const row = cell.parentElement;
        const colIndex = Array.from(row.children).indexOf(cell);
        if (colIndex === 7 || colIndex === 8) {
            input.style.color = (val < 60) ? 'red' : 'black';
        }
    });
});

document.querySelectorAll('tr[data-subject]').forEach(row => {
    const inputs = row.querySelectorAll('input[type="number"]');
    if (inputs.length >= 2) {
        const startedInput = inputs[0];
        const completedInput = inputs[1];
        startedInput.addEventListener('input', () => {
            if (startedInput.value !== "") completedInput.value = Math.max(0, parseInt(startedInput.value)-1);
        });
        completedInput.addEventListener('input', () => {
            if (completedInput.value !== "") startedInput.value = parseInt(completedInput.value)+1;
        });
    }
});
</script>
