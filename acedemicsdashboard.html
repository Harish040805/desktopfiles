<style>
    /* Reset and Layout */
    * { box-sizing: border-box; }
    body { 
        overflow: hidden; 
        font-family: 'Lucida Sans', sans-serif; 
        margin: 0; 
        background: #f4ffee; 
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 5px;
    }

    /* Top Navigation Bar */
    .header-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 5px;
    }
    #scrollDnBtn { 
        flex: 3;
        height: 30px; 
        font-size: 14px; 
        background: lime; 
        border: none; 
        color: #000; 
        font-weight: bold; 
        border-radius: 4px; 
        cursor: pointer;
    }

    #scrollUpBtn {

        font-size: 14px; 
        background: lime; 
        border: none; 
        color: #000; 
        font-weight: bold; 
        border-radius: 4px; 
        cursor: pointer;
    }

    /* Main Container (Tables Left, Notes Right) */
    .main-content {
        display: flex;
        gap: 0px;
        flex: 1;
        min-height: 0; /* Important for flex child overflow */
    }

    .tables-section {
        flex: 3; /* Takes 75% of width */
        display: flex;
        flex-direction: column;
        gap: 0px;
    }

    .notes-section {
        flex: 1; /* Takes 25% of width */
        display: flex;
        flex-direction: column;
    }

    /* Table Styling */
    h3 { 
        margin: 0; 
        font-size: 14px; 
        background-color: #00ec00; 
        padding: 4px; 
        color: #fff; 
        text-align: center;
    }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { 
        border: 1px solid #1fed0c; 
        padding: 2px; 
        text-align: center; 
        font-size: 12px;
    }
    th { background-color: lime; color: white; }
    
    /* Input Compactness */
    input[type="number"] { width: 40px; padding: 1px; font-size: 11px; border: 1px solid #ccc; }
    input[type="checkbox"] { 
        margin: 0 1px; 
        transform: scale(0.9); 
        cursor: pointer;
    }
    tr:nth-child(even) { background-color: #f9f9f9; }

    /* Right Column Textarea */
    .scroll-textbox { 
        flex: 1; 
        width: 100%; 
        border: 1px solid #1fed0c; 
        padding: 8px; 
        resize: none; 
        font-size: 14px; 
        font-family: Arial, sans-serif;
        background: #fff;

    .key-row { background-color: lime !important; color: #fff; font-size: 10px; }
    .key-row td { padding: 1px; }
</style>

<script>
let db;
const DB_NAME = "AcademicsDashboardDB";
const DB_VERSION = 1;
const STORE_NAME = "fields";

const request = indexedDB.open(DB_NAME, DB_VERSION);

request.onupgradeneeded = function(event) {
    db = event.target.result;
    if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "id" });
    }
};

request.onsuccess = function(event) {
    db = event.target.result;
    restoreAllFields();
};

function saveField(id, value) {
    const transaction = db.transaction([STORE_NAME], "readwrite");
    const store = transaction.objectStore(STORE_NAME);
    store.put({ id, value });
}

function restoreAllFields() {
    const transaction = db.transaction([STORE_NAME], "readonly");
    const store = transaction.objectStore(STORE_NAME);
    const requestAll = store.getAll();
    requestAll.onsuccess = function() {
        requestAll.result.forEach(item => {
            const el = document.getElementById(item.id);
            if (el) {
                if (el.type === "checkbox") el.checked = item.value;
                else el.value = item.value;
            }
        });
    };
}

let allInputs = document.querySelectorAll("input, textarea");
allInputs.forEach((el, index) => {
    if (!el.id) el.id = "field_" + index;
    if (el.type === "checkbox") {
        el.addEventListener("change", () => saveField(el.id, el.checked));
    } else {
        el.addEventListener("input", () => saveField(el.id, el.value));
    }
});

document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('input', () => {
        let val = parseInt(input.value);
        let min = parseInt(input.min) || 0;
        let max = parseInt(input.max) || 100;
        if (!isNaN(val)) {
            if (val < min) input.value = min;
            if (val > max) input.value = max;
        }
        const colIndex = Array.from(input.parentElement.parentElement.children).indexOf(input.parentElement);
        if (colIndex === 7 || colIndex === 8) {
            input.style.color = (val < 60) ? 'red' : 'black';
        }
    });
});

document.querySelectorAll('tr[data-subject]').forEach(row => {
    const startedInput = row.querySelector('td:nth-child(2) input[type="number"]');
    const completedInput = row.querySelector('td:nth-child(3) input[type="number"]');
    if (startedInput && completedInput) {
        startedInput.addEventListener('input', () => {
            if (startedInput.value !== "") completedInput.value = Math.max(0, parseInt(startedInput.value)-1);
        });
        completedInput.addEventListener('input', () => {
            if (completedInput.value !== "") startedInput.value = parseInt(completedInput.value)+1;
        });
    }
});
</script>
